---
# https://pre-commit.com/
# Run `pre-commit install` once after `just install` to activate locally.
repos:
  # scripts/*.py (top level) is EMA legacy and deliberately excluded from all
  # hooks. scripts/python/ is in scope for everything.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]  # allow Python tags in mkdocs.yml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: ^scripts/[^/]+\.py$
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^scripts/[^/]+\.py$
      - id: debug-statements
        exclude: ^scripts/[^/]+\.py$

  # Lint + format scoped to actively-developed Python paths. scripts/*.py at
  # the top level is EMA legacy (imported from external-metadata-awareness)
  # and deliberately excluded; scripts/python/ is in scope.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.3
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src|tests|scripts/python)/
      - id: ruff-format
        files: ^(src|tests|scripts/python)/

  # uv-lock hook omitted for now: main's uv.lock was generated by uv >= 0.7
  # (revision = 3) but the pinned uv-pre-commit version here writes
  # revision = 1, which churns the lock on every commit. Reintroduce once the
  # team settles on a shared uv version.

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
        args: [src]
        pass_filenames: false
