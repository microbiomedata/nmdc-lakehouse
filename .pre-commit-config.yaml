---
# https://pre-commit.com/
# Run `pre-commit install` once after `just install` to activate locally.
repos:
  # check-added-large-files and check-merge-conflict run repo-wide (no Python
  # content; safe on EMA legacy scripts). The remaining hygiene hooks exclude
  # scripts/*.py (EMA legacy). check-yaml uses --unsafe defensively for when
  # mkdocs.yml lands (mkdocs is a declared dependency).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]  # mkdocs uses Python tags; included as a dep
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: ^scripts/[^/]+\.py$
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^scripts/[^/]+\.py$
      - id: debug-statements
        exclude: ^scripts/[^/]+\.py$

  # Lint + format scoped to actively-developed Python paths. scripts/*.py at
  # the top level is EMA legacy (imported from external-metadata-awareness)
  # and deliberately excluded; scripts/python/ is in scope.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.3
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src|tests|scripts/python)/
      - id: ruff-format
        files: ^(src|tests|scripts/python)/

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.6.12
    hooks:
      - id: uv-lock

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
        args: [src]
        pass_filenames: false
