id: https://microbiomedata.github.io/nmdc-lakehouse/schema/nmdc_runtime_collections
name: nmdc_runtime_collections
description: >-
  Local LinkML schema fragment for MongoDB collections maintained by nmdc-runtime
  that are not part of the nmdc-schema Database class. Used by nmdc-lakehouse
  to derive PyArrow schemas for these collections.

prefixes:
  linkml: https://w3id.org/linkml/
  nmdc: https://w3id.org/nmdc/

imports:
  - linkml:types

default_range: string

classes:

  NmdcGraphNode:
    description: >-
      One row per NMDC entity in the alldocs graph index. Corresponds to a
      document in the MongoDB alldocs collection.
    slots:
      - id
      - type

  NmdcGraphNodeTypeAncestor:
    description: >-
      Side table for NmdcGraphNode. One row per (entity, ancestor type) pair,
      derived from the alldocs _type_and_ancestors array. Follows the standard
      nmdc-lakehouse side-table pattern with parent_id as the foreign key.
    slots:
      - parent_id
      - type_ancestor

  NmdcGraphEdge:
    description: >-
      One directed edge in the NMDC provenance graph. Derived from the
      _downstream arrays in alldocs — each edge appears exactly once (src
      precedes dst in the processing chain). The MongoDB field names _upstream
      and _downstream do not appear in this table.
    slots:
      - src_id
      - src_type
      - dst_id
      - dst_type

slots:
  id:
    description: NMDC entity identifier (e.g. nmdc:bsm-11-xyz)
    range: string
    required: true

  type:
    description: Immediate LinkML class of the entity (e.g. nmdc:Biosample)
    range: string
    required: true

  parent_id:
    description: Foreign key back to NmdcGraphNode.id
    range: string
    required: true

  type_ancestor:
    description: One element of the entity's full LinkML class hierarchy
    range: string
    required: true

  src_id:
    description: Source entity ID (the precedes/informs side of the edge)
    range: string
    required: true

  src_type:
    description: Immediate LinkML class of the source entity
    range: string
    required: true

  dst_id:
    description: Destination entity ID (the follows/is-informed-by side of the edge)
    range: string
    required: true

  dst_type:
    description: Immediate LinkML class of the destination entity
    range: string
    required: true
